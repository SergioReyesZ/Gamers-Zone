<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="icon" type="image/png" href="iconos/logo.avif">
        <link rel="stylesheet" href="css/juguetes.css"> 
        <title>Gamer's Zone - Juguetes</title> 
    </head>
    <body>
        <div id="navbar-placeholder"></div>
        <div class="-titulo-back">
                <button class="boton"><a href="javascript:history.back()"><i class="bi bi-arrow-left"></i></a></button>
                <h1>Juguetes</h1>
                <button class="boton agregar"><i class="bi bi-plus"></i></button>
            </div>
        <div class="contenedor-principal">
            <!-- Filtro de la parte izquierda-->
             <div class="menu-desplegable abrir" id="abrirFiltro">
                    <p class="titulo">Filtrar</p>
                    <button><i class="bi bi-chevron-down"></i></button>
            </div>
            <div class="filtro" id="filtro">
                <!-- Disponibilidad menú desplegable -->
                <div class="menu-desplegable" id="abrirDisp">
                    <p class="titulo">Por disponibilidad</p>
                    <button><i class="bi bi-chevron-down"></i></button>
                </div>
                
                <div class="opcion-toggle" id="dispToggle">
                    <input type="checkbox" id="test" class="toggle">
                <label for="test" class="label">
                    <div class="ball"></div>
                </label>
                <p>Mostrar productos agotados</p>
                </div>
                <hr class="separacion">
                <!-- Categorías menú desplegable -->
                <div class="menu-desplegable" id="abrirCat">
                    <p class="titulo">Por categoría</p>
                    <button><i class="bi bi-chevron-down"></i></button>
                </div>
                <div class="cont-categorias" id="cat">
                    <div class="busqueda">
                    <button class="boton"><i class="bi bi-search"></i></button>
                    <input type="search" class="barra" placeholder="Por categoría">

                    </div>
                    <div class="categorias">
                        <input type="checkbox">
                        <p>Switch 2</p>
                    </div>
                </div>
                <hr class="separacion">

                <!-- Precios menú desplegable -->
                <div class="menu-desplegable" id="abrirPrec">
                    <p class="titulo">Por precios</p>
                    <button><i class="bi bi-chevron-down"></i></button>
                </div>
                
                <div class="porPrecio" id="prec">
                    <input type="number" placeholder="Minímo">
                    <p>a</p>
                    <input type="number" placeholder="Máximo">
                    <button><i class="bi bi-arrow-right-circle-fill"></i></button>
                </div>
                <hr class="separacion">

                <!-- Almacenamiento menú desplegable -->

                <div class="menu-desplegable" id="abrirAlmac">
                    <p class="titulo">Almacenamiento</p>
                    <button><i class="bi bi-chevron-down"></i></button>
                </div>

                <div class="almacenamiento" id="almac">
                    <div class="busqueda">
                    <button class="boton"><i class="bi bi-search"></i></button>
                    <input type="search" class="barra" placeholder="Almacenamiento">
                    </div>
                    <div class="categorias">
                        <input type="checkbox">
                        <p>500GB+</p>
                    </div>
                </div>
                
                <hr class="separacion">
                <!-- Color menú desplegable -->
                
                <div class="menu-desplegable" id="abrirColor">
                    <p class="titulo">Color principal</p>
                    <button><i class="bi bi-chevron-down"></i></button>
                </div>

                <div class="colores" id="color">
                    <div class="busqueda">
                    <button class="boton"><i class="bi bi-search"></i></button>
                    <input type="search" class="barra" placeholder="Color principal">
                    </div>
                    <div class="categorias">
                        <input type="checkbox">
                        <p>Blanco</p>
                    </div>
                </div>

                <hr class="separacion">

                <!-- Condición menú desplegable -->
                 <div class="menu-desplegable" id="abrirCond">
                    <p class="titulo">Condición</p>
                    <button><i class="bi bi-chevron-down"></i></button>
                 </div>
                 <div class="condicion" id="cond">
                    <div class="categorias">
                        <input type="checkbox">
                        <p>Nuevo</p>
                    </div>
                 </div>
             
            </div>
            <!-- Contenedor principal-->
            <div class="contenedor-productos">
                
                <div class="busqueda-productos">
                    <button class="boton"><i class="bi bi-search"></i></button>
                    <input type="search" class="barra" placeholder="Buscar juguetes...">
                </div>
                <div class="productos-principal">
                    
                    <div class="productos">
                        <img src="iconos/juguete.avif">
                        <div class="info">
                            <p class="subtitulo">Marvel</p>
                            <p class="titulo">Lego guardianes de la Galaxia</p>
                            <div class="precarro">
                                <p class="precio">$250</p>
                                <div class="icono-contenedor abrirCarrito">
                                    <button class="icono-original"><i class="bi bi-cart"></i></button>
                                    <button class="icono-hover"><i class="bi bi-cart-check"></i></button>
                                </div>
                                
                            </div>
                        </div>
                    </div>
                    
                </div>
                
                
            </div>
        </div>

        <div class="alerta" id="alert">
            <p>Producto agregado al carrito con éxito</p>
            <div class="icono-contenedor">
                <button class="icono-original"><i class="bi bi-cart"></i></button>
                <button class="icono-hover"><i class="bi bi-cart-check"></i></button>
            </div>
            <a href="index.html" class="titulo">Ir a Inicio</a>
            
            <a id="cerrarAlert" class="cerrar-alerta">Seguir viendo productos</a>
        </div>

        <script src="scripts/juguetes.js"></script>
    </body>
</html>

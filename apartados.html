<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/apartados.css">       
        <title>Gamer's Zone - Apartados</title> 
        <link rel="icon" type="image/png" href="iconos/logo.png">
    </head>
    <body>
        <div id="navbar-placeholder"></div>
        <div class="contenedor-principal">
            <div class="-titulo-back">
                <button class="boton"><a href="javascript:history.back()"><i class="bi bi-arrow-left"></i></a></button>
                <h1>Apartados</h1>
                <button class="boton agregar"><i class="bi bi-plus"></i></button>
            </div>
            <div class="busqueda" onclick="document.getElementById('barra').focus()">
                    <input type="search" class="barra" placeholder="Buscar apartado..." id="barra">
                    <button class="boton"><i class="bi bi-search"></i></button>
                </div>
            <div class="tabla-productos">
                <table class="tabla-principal">
                    <tr>
                        <th>Cliente</th>
                        <th>Teléfono</th>
                        <th>Producto</th>
                        <th>Abono</th>
                        <th>Resta</th>
                        <th>Total</th>
                        <th>Abonar</th>
                        <th>Fecha vencimiento</th>
                    </tr>
                    <tr>
                        <td><a>Hector Velasquez</a></td>
                        <td>8331303030</td>
                        <td><a >Nintendo Switch</a></td>
                        <td>$500</td>
                        <td>$3000</td>
                        <td>$3500</td>
                        <td><button class="tb">Abonar</button></td>
                        <td>27/03/2026</td>
                    </tr>
                </table>
            </div>
        </div>
        <script src="scripts/apartados.js"></script>
    </body>
</html>

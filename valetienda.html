<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/valetienda.css">       
        <title>Gamer's Zone - Vale de Tienda</title> 
        <link rel="icon" type="image/png" href="iconos/logo.png">
    </head>
    <body>
        <header class="menu">
           
            <a class="logo-titulo" href="index.html">
                <img class="logo" src="iconos/logo.png" alt="logo">
                <p>Inventario Gamer's Zone</p>
            </a>
            <div class="derecha">
                <p id="fecha" class="fecha"></p>
                <button class="boton-header" onclick="window.location.href='ubicacion.html';"><i class="bi bi-geo-alt-fill"></i></button>
                <button class="boton-header" id="botonCuenta"><i class="bi bi-person-circle"></i></button>
                <nav class="nav-cuenta" id="navCuenta">
                <ul class="cuenta-list">
                    <li><a href="login.html">Iniciar sesión</a></li>
                    <li><a href="">Registrarse</a></li>
                    <li><a href="">Más información</a></li>
                </ul>
            </nav>
            </div>
        </header>
        <div class="contenedor-principal">
            <div class="-titulo-back">
                <button class="boton"><a href="javascript:history.back()"><i class="bi bi-arrow-left"></i></a></button>
                <h1>Vale de Tienda</h1>
            </div>
            <div class="busqueda">
                    <input type="search" class="barra" placeholder="Buscar cliente...">
                    <button class="boton"><i class="bi bi-search"></i></button>
                </div>
            <div class="tabla-productos">
                <table class="tabla-principal">
                    <tr>
                        <th>Cliente</th>
                        <th>Teléfono</th>
                        <th>Cantidad</th>
                        <th>Usar</th>
                        <th>Fecha expedición</th>
                    </tr>
                    <tr>
                        <td><a>Hector Velasquez</a></td>
                        <td>8331303030</td>
                        <td>$500</td>
                        <td><button class="tb">Todo</button><button class="tb" id="abrirAlerta">Usar una parte</button></td>
                        <td>27/03/2026</td>
                    </tr>
                </table>
            </div>
        </div>
        <div class="alerta" id="alert">
            <label for="">Vale de tienda de {cliente}</label>
            <p>¿Qué cantidad deseas utilizar?</p>
            <div class="cantidad">
                <button onclick="cambiarCantidad(-1)" class="menos"><i class="bi bi-dash"></i></button>
                <input type="number" value="500" id="inputCantidad">
                <button onclick="cambiarCantidad(1)" class="mas"><i class="bi bi-plus"></i></button>
            </div>
            <button class="utilizar"><i class="bi bi-check"></i></button>
            <label class="error">Error, la cantidad no puede ser mayor a lo que indica el vale de tienda</label>
            <a id="cerrarAlert" class="cerrar-alerta">Salir</a>
        </div>
        <script src="scripts/valetienda.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="viewport" content="width=device-width, height=device-height,  initial-scale=1.0, user-scalable=no;user-scalable=0;"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/cuenta.css">       
        <title>Gamer's Zone - Contactos</title> 
        <link rel="icon" type="image/png" href="iconos/logo.png">
    </head>
    <body>
        
        <div id="navbar-placeholder"></div>

        <div class="contenedor-principal">
            <div class="contenedor-izquierdo">
                <div class="-titulo-back">
                <button class="boton"><a href="javascript:history.back()"><i class="bi bi-arrow-left"></i></a></button>
                <h1>Cuenta</h1>
                </div>
                <div class="foto">
                    <img src="iconos/logo.png" alt="Descripción de la foto" width="150">
                    <div class="editar">
                        <i class="bi bi-pencil-square"></i>
                        <p>Foto de perfil</p>
                    </div>
                </div>
            </div>
            <hr class="l-vertical">
            <div class="info">
                <h2>Datos</h2>
                
                <div class="datos">
                    <p>
                    <span><strong>Inicial:</strong></span>
                    <span>{Inicial usuario}</span>
                </p>
                    <p>
                    <span><strong>Nombre:</strong></span>
                    <span>{nombre usuario}</span>
                </p>
                <p>
                    <span><strong>Usuario: </strong></span>
                    <span>{usuario}</span>
                </p>
                <p>
                    <span><strong>Tipo: </strong></span>
                <span>{tipo usuario}</span>
                </p>
                <p>
                    <span><strong>Correo: </strong></span>
                <span>{correo del usuario}</span>
                </p>
                <p>
                    <span><strong>Teléfono: </strong></span>
                    <span>{teléfono del usuario}</span>
                </p>
                </div>
                <hr class="l-horizontal">
                <h2>Información personal</h2>
                
                <div class="datos">
                    <p>
                    <span><strong>Sexo:</strong></span>
                    <span>{Sexo usuario}</span>
                </p>
                <p>
                    <span><strong>Fecha de nacimiento: </strong></span>
                    <span>{Fecha}</span>
                </p>
                
                </div>
                <div class="editar">
                        <p>Editar información</p>
                        
                        <i class="bi bi-pencil-square"></i>
                    </div>
            </div>
        </div>
        <script src="scripts/cuenta.js"></script>
    </body>
</html>

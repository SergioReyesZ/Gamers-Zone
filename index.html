<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/index.css">       
        <title>Gamer's Zone - Inicio</title> 
        <link rel="icon" type="image/png" href="iconos/logo.png">
    </head>
    <body>
        <div id="navbar-placeholder"></div>
        
        <div class="contenedor">

        <div class="contenedor-izquierda">
            <div class="busqueda">
            <p>Buscar producto o escanea código de barras</p>
                <div class="busqueda-opc">
                <div class="buscar">
                    <input id="barra" class="barra" placeholder="Busca producto... (Enter para agregar)">
                    <button class="boton" id="remove"><i class="bi bi-x-lg"></i></button>
                </div>
                
                <button class="boton-escanear"><i class="bi bi-upc-scan"></i></button>
                <div class="container-filtro">
                    <button class="boton-filtrar" id="boton-filtrar"><i class="bi bi-filter"></i></button>
                    <div class="filtro" id="filtro">
                        <label>Precio</label>
                        <div class="f-precio">
                            <input type="text" placeholder="Mínimo">
                            <label>a</label>
                            <input type="text" placeholder="Máximo">
                            <button><i class="bi bi-arrow-right-circle-fill"></i></button>
                        </div>
                    </div>
                </div>
                </div>
                <div class="check-op">
                    <input type="checkbox" checked id="consolasBox">
                    <label for="consolasBox">Consolas</label>
                    <input type="checkbox" id="juegosBox" checked>
                    <label for="juegosBox">Juegos</label>
                    <input type="checkbox" id="figurasBox" checked>
                    <label for="figurasBox">Figuras</label>
                    <input type="checkbox" id="accesoriosBox" checked>
                    <label for="accesoriosBox">Accesorios</label>
                    <input type="checkbox" id="juguetesBox" checked>
                    <label for="juguetesBox">Juguetes</label>
                    <input type="checkbox" id="cartasBox" checked>
                    <label for="cartasBox">Cartas</label>
                </div>
                
                
            </div>
            <div class="tabla-productos">
                <table class="tabla-principal">
                    
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Vender</th>
                        <th>Apartar</th>
                        <th>Detalles</th>
                    </tr>
                    <tr>
                        <td>Nintendo switch</td>
                        <td>$3500</td>
                        <td><button class="tb">Vender</button></td>
                        <td><button class="tb">Apartar</button></td>
                        <td><a class="ta">Más información...</a></td>
                    </tr>
                    <tr>
                        <td>Nintendo switch</td>
                        <td>$3500</td>
                        <td><button class="tb">Vender</button></td>
                        <td><button class="tb">Apartar</button></td>
                        <td><a class="ta">Más información...</a></td>
                    </tr>
                </table>
            </div>
        </div>
        
        
        <div class="carrito">
            <p>Carrito</p>
            <table class="tabla-principal">
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                    </tr>
                    <tr>
                        <td>Nintendo switch</td>
                        <td>$3500</td>
                    </tr>
                </table>
            <div class="precio">
                <label>Total: </label>
                <label>$3500 </label>
            </div>
            <button class="venta-end">Terminar venta</button>
        </div>
    </div>
        

        <script src="scripts/index.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="css/reporte.css">       
        <title>Gamer's Zone - Inicio</title> 
        <link rel="icon" type="image/png" href="iconos/logo.png">
    </head>
    <body>
       <div id="navbar-placeholder"></div>

        <div class="reporte-general">
            <div class="-titulo-back">
                <button class="boton"><a href="javascript:history.back()"><i class="bi bi-arrow-left"></i></a></button>
                <h1>Reporte general</h1>
            </div>
        
            <div class="contenedor-reporte">
                <div class="busqueda">
                    <input type="search" class="barra" placeholder="Buscar producto...">
                    <button class="boton"><i class="bi bi-search"></i></button>
                </div>

                
                <div class="-select-combobox" id="div-calendario">
                    <span id="texto-seleccionado"></span>
                    <input type="date" id="input-fecha" class="calendario">
                    <i class="bi bi-chevron-down"></i>
                </div>
                <div class="monto">
                    <p>Monto total</p>
                    
                    <h1><span>$</span>0.00<span class="divisa">MXN</span></h1>
                </div>
                
                <div class="dinero">
                    <i class="bi bi-credit-card"> </i>
                    <div class="tarjeta">
                        <p>Tarjeta</p>
                        <p>$500.00</p>
                    </div>
                    <i class="bi bi-coin"></i>
                    <div class="efectivo">
                        <p>Efectivo</p>
                        <p>$1000.00</p>
                    </div>
                </div>
            </div>
        </div>
        <script src="scripts/reporte.js"></script>
    </body>
</html>
